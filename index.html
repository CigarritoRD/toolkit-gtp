<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <!-- Anti-FOUC: debe ir aquí, antes de todo -->
    <script>
      (function() {
        const saved = localStorage.getItem('Toolkit-box-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>cell-proyect</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
