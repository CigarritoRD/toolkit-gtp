    <!-- Theme Color -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#6366f1" />
    
    <!-- Anti-FOUC: debe ir aquí, antes de todo -->
    <script>
      (function() {
        const saved = localStorage.getItem('Toolkit-box-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (saved === 'dark' || (!saved && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <title>GTP toolkit</title>
